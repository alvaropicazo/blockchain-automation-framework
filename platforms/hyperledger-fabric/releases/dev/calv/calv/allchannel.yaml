apiVersion: helm.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: channel-calv-allchannel
  namespace: calv-net
  annotations:
    fluxcd.io/automated: "false"
spec:
  releaseName: channel-calv-allchannel
  chart:
    git: https://github.com/alvaropicazo/blockchain-automation-framework.git
    ref: addchannel-issue
    path: platforms/hyperledger-fabric/charts/create_channel   
  values:
    metadata:
      namespace: calv-net
      network:
        version 1.4.4
      images:
        fabrictools: hyperledger/fabric-tools:1.4.4
        alpineutils: index.docker.io/hyperledgerlabs/alpine-utils:1.0
    peer:
      name: peer0
      address: peer0.calv-net:7051
      localmspid: calvMSP
      loglevel: debug
      tlsstatus: true

    vault:
      role: vault-role
      address: http://vault.internal.dev2.aws.blockchaincloudpoc-develop.com:20001
      authpath: calv-net-auth
      adminsecretprefix: secret/crypto/peerOrganizations/calv-net/users/admin
      orderersecretprefix: secret/crypto/peerOrganizations/calv-net/orderer 
      serviceaccountname: vault-auth
      imagesecretname: regcred

